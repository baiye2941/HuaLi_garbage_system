name: build-rust-wheel

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing tag to publish, or leave empty for artifact-only build"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build-windows-wheel:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install maturin
        run: python -m pip install --upgrade pip maturin

      - name: Build wheel
        run: maturin build --release --manifest-path rust/Cargo.toml --interpreter python

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: huali-garbage-core-wheel
          path: rust/target/wheels/*.whl

      - name: Resolve release tag
        id: release_tag
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          elif [[ -n "${{ github.event.inputs.release_tag }}" ]]; then
            echo "tag=${{ github.event.inputs.release_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish wheel to release
        if: steps.release_tag.outputs.tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          generate_release_notes: true
          files: rust/target/wheels/*.whl
